name: Deploy Backend to Staging

on:
  workflow_dispatch:  # Manual deployment only - trigger via GitHub Actions UI

env:
  AWS_REGION: ap-southeast-1
  EKS_CLUSTER_NAME: scl-cluster
  ECR_REPOSITORY: scl-backend
  NAMESPACE: scl-staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:staging-latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:staging-latest
          echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Create Kick OAuth secret (if not exists)
        env:
          KICK_CLIENT_ID: ${{ secrets.KICK_CLIENT_ID }}
          KICK_CLIENT_SECRET: ${{ secrets.KICK_CLIENT_SECRET }}
        run: |
          # Create secret idempotently (won't fail if already exists)
          kubectl create secret generic kick-auth-secret \
            --from-literal=client-id="$KICK_CLIENT_ID" \
            --from-literal=client-secret="$KICK_CLIENT_SECRET" \
            -n ${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f - || \
          echo "Secret may already exist, continuing..."

      - name: Deploy to Kubernetes
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Ensure KICK env vars are present in deployment (add if missing, ignore if already exists)
          # Check if env vars already exist
          if ! kubectl get deployment scl-backend -n ${{ env.NAMESPACE }} -o jsonpath='{.spec.template.spec.containers[0].env[?(@.name=="KICK_CLIENT_ID")]}' | grep -q KICK_CLIENT_ID; then
            echo "Adding KICK environment variables to deployment..."
            kubectl patch deployment scl-backend -n ${{ env.NAMESPACE }} --type='json' -p='[
              {
                "op": "add",
                "path": "/spec/template/spec/containers/0/env/-",
                "value": {
                  "name": "KICK_CLIENT_ID",
                  "valueFrom": {"secretKeyRef": {"name": "kick-auth-secret", "key": "client-id"}}
                }
              },
              {
                "op": "add",
                "path": "/spec/template/spec/containers/0/env/-",
                "value": {
                  "name": "KICK_CLIENT_SECRET",
                  "valueFrom": {"secretKeyRef": {"name": "kick-auth-secret", "key": "client-secret"}}
                }
              }
            ]'
          else
            echo "KICK environment variables already present in deployment"
          fi
          
          # Update deployment with new image (use sha-tagged image, not staging-latest which may be cached on nodes)
          kubectl set image deployment/scl-backend \
            backend=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            prisma-migrate=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -n ${{ env.NAMESPACE }} || \
          echo "Deployment not found. Please ensure infrastructure repo has deployed the base deployment first."
          
          # Wait for rollout (fails job if deployment exceeds progress deadline)
          kubectl rollout status deployment/scl-backend -n ${{ env.NAMESPACE }} --timeout=12m

      - name: Dump backend pod state on failure
        if: failure()
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=scl-backend -o wide
          kubectl describe deployment scl-backend -n ${{ env.NAMESPACE }} | tail -80
          POD=$(kubectl get pods -n ${{ env.NAMESPACE }} -l app=scl-backend -o jsonpath='{.items[0].metadata.name}' 2>/dev/null) && \
            if [ -n "$POD" ]; then
              echo "--- Backend pod logs (main container) ---"
              kubectl logs "$POD" -n ${{ env.NAMESPACE }} -c backend --tail=100 2>/dev/null || true
              echo "--- Init container logs (prisma-migrate) ---"
              kubectl logs "$POD" -n ${{ env.NAMESPACE }} -c prisma-migrate --tail=50 2>/dev/null || true
            fi
          kubectl get events -n ${{ env.NAMESPACE }} --sort-by='.lastTimestamp' | tail -30

      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=scl-backend
          kubectl get svc -n ${{ env.NAMESPACE }} -l app=scl-backend
